<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Master Exam Dashboard | Md. Ariful Islam</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.08); }
        body {
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), 
                        url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed; color: #f4f4f4;
            font-family: 'Hind Siliguri', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .wisdom-box { background: rgba(212, 175, 55, 0.15); border: 1px solid var(--gold); padding: 25px; border-radius: 15px; text-align: center; width: 95%; max-width: 850px; margin-bottom: 25px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; backdrop-filter: blur(10px); }
        .main-timer-box { text-align: center; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); margin-bottom: 40px; width: 95%; max-width: 850px; }
        .timer-grid { display: flex; justify-content: center; gap: 15px; font-size: 2.5rem; font-weight: bold; }
        .unit-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; min-width: 90px; border: 1px solid var(--gold); }
        .unit-box small { display: block; font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        .master-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 25px; width: 100%; max-width: 1300px; }
        .card { background: var(--glass); padding: 25px; border-radius: 15px; border-top: 4px solid var(--gold); backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; }
        .title { font-size: 1.3rem; color: var(--gold); font-weight: bold; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px; }
        textarea, input[type="text"] { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #444; border-radius: 8px; color: #eee; padding: 10px; font-family: inherit; }
        .save-btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .progress-bar { background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: var(--gold); height: 100%; transition: width 0.4s; }
        input[type="range"] { width: 100%; accent-color: var(--gold); }
    </style>
</head>
<body>

    <div class="wisdom-box">
        <div id="wisdom-text">পড়ুন আপনার রবের নামে যিনি সৃষ্টি করেছেন।</div>
        <div id="wisdom-source">— সূরা আল-আলাক: ১</div>
    </div>

    <div class="main-timer-box">
        <h2 id="main-target-title" style="color: var(--gold); margin-bottom: 15px;">Next Target</h2>
        <div class="timer-grid">
            <div class="unit-box"><span id="m-d">00</span><small>দিন</small></div>
            <div class="unit-box"><span id="m-h">00</span><small>ঘণ্টা</small></div>
            <div class="unit-box"><span id="m-m">00</span><small>মিনিট</small></div>
            <div class="unit-box"><span id="m-s">00</span><small>সেকেন্ড</small></div>
        </div>
    </div>

    <h1>Md. Ariful Islam Dashboard (LLB 3/2 Mid)</h1>
    
    <div class="master-grid" id="main-grid"></div>

    <script>
        let quotes = JSON.parse(localStorage.getItem('arif_quotes')) || [
            { t: "হে আমার পালনকর্তা, আমার জ্ঞান বৃদ্ধি করুন।", s: "সূরা ত্বহা: ১১৪" },
            { t: "নিশ্চয়ই কষ্টের সাথেই স্বস্তি রয়েছে।", s: "সূরা আল-ইনশিরাহ: ৫" },
            { t: "Justice must not only be done, but seen to be done.", s: "Legal Maxim" }
        ];

        function rotateWisdom() {
            const r = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('wisdom-text').innerText = r.t;
            document.getElementById('wisdom-source').innerText = "— " + r.s;
        }
        setInterval(rotateWisdom, 60000);

        // Updated Course Data from Routine
        const courses = [
            { id: 0, code: "LAW 311", name: "Criminal Procedure", date: "2026-03-05T10:00:00" },
            { id: 1, code: "LAW 313", name: "Civil Procedure", date: "2026-03-08T10:00:00" },
            { id: 2, code: "LAW 317", name: "Intellectual Property", date: "2026-03-10T10:00:00" },
            { id: 3, code: "LAW 315", name: "Registration, PDR & Limitation", date: "2026-03-12T10:00:00" },
            { id: 4, code: "LAW 319", name: "Professional Ethics & Court Craft", date: "2026-03-14T10:00:00" }
        ];

        const grid = document.getElementById('main-grid');
        courses.forEach(c => {
            grid.innerHTML += `
                <div class="card">
                    <div class="title">${c.code}: ${c.name}</div>
                    <div id="st-${c.id}" style="text-align:center; font-size:0.9rem; color:#ccc;">সময় গণনা...</div>
                    <div class="prog-area">
                        <label>প্রস্তুতি: <span id="pv-${c.id}">0</span>%</label>
                        <input type="range" id="pr-${c.id}" value="0" oninput="updateUI(${c.id}, this.value)">
                        <div class="progress-bar"><div class="progress-fill" id="pb-${c.id}"></div></div>
                    </div>
                    <textarea id="ts-${c.id}" placeholder="সাজেশন এখানে লেখো..."></textarea>
                    <button class="save-btn" onclick="saveSubject(${c.id})">সেভ করো</button>
                </div>`;
        });

        grid.innerHTML += `
            <div class="card"><div class="title">✨ নতুন উক্তি যোগ করো</div>
                <input type="text" id="new-q-text" placeholder="উক্তি বা আয়াত লেখো...">
                <input type="text" id="new-q-source" placeholder="উৎস..."><button class="save-btn" onclick="addQuote()">উক্তি সেভ করো</button>
            </div>
            <div class="card"><div class="title">🛡️ Exam Checklist</div>
                ${["Admit Card", "ID Card (SIU)", "Reg Card", "Pen/Scale", "Watch"].map((it, i) => `<div style="display:flex; gap:10px;"><input type="checkbox" id="chk-${i}" onchange="saveCheck()"> <label>${it}</label></div>`).join('')}
            </div>
            <div class="card"><div class="title">📖 My Legal Thoughts</div>
                <textarea id="diary" style="height:150px;" placeholder="তোমার ডায়েরি নোট..."></textarea>
                <button class="save-btn" onclick="saveDiary()">ডায়েরি সেভ করো</button>
            </div>`;

        function updateUI(id, v) { document.getElementById(`pv-${id}`).innerText = v; document.getElementById(`pb-${id}`).style.width = v + '%'; }
        function saveSubject(id) { localStorage.setItem(`s_sugg_${id}`, document.getElementById(`ts-${id}`).value); localStorage.setItem(`s_prog_${id}`, document.getElementById(`pr-${id}`).value); alert('Saved!'); }
        function saveDiary() { localStorage.setItem('s_diary', document.getElementById('diary').value); alert('Saved!'); }
        function addQuote() { const t = document.getElementById('new-q-text').value, s = document.getElementById('new-q-source').value; if(t && s) { quotes.push({t, s}); localStorage.setItem('arif_quotes', JSON.stringify(quotes)); alert('Quote Added!'); } }
        function saveCheck() { for(let i=0; i<5; i++) localStorage.setItem(`s_check_${i}`, document.getElementById(`chk-${i}`).checked); }

        window.onload = function() {
            rotateWisdom();
            courses.forEach(c => {
                const s = localStorage.getItem(`s_sugg_${c.id}`), p = localStorage.getItem(`s_prog_${c.id}`);
                if(s) document.getElementById(`ts-${c.id}`).value = s;
                if(p) { document.getElementById(`pr-${c.id}`).value = p; updateUI(c.id, p); }
            });
            const d = localStorage.getItem('s_diary'); if(d) document.getElementById('diary').value = d;
            for(let i=0; i<5; i++) if(localStorage.getItem(`s_check_${i}`) === 'true') document.getElementById(`chk-${i}`).checked = true;
        };

        setInterval(() => {
            const now = new Date().getTime();
            let nextExam = courses.find(c => new Date(c.date).getTime() > now);
            if(nextExam) {
                const diff = new Date(nextExam.date).getTime() - now;
                document.getElementById('main-target-title').innerText = "Next Exam: " + nextExam.code;
                document.getElementById('m-d').innerText = Math.floor(diff / 86400000);
                document.getElementById('m-h').innerText = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('m-m').innerText = Math.floor((diff % 3600000) / 60000);
                document.getElementById('m-s').innerText = Math.floor((diff % 60000) / 1000);
            }
            courses.forEach(c => {
                const diff = new Date(c.date).getTime() - now;
                const el = document.getElementById(`st-${c.id}`);
                if(diff > 0) { el.innerText = `বাকি: ${Math.floor(diff/86400000)} দিন ${Math.floor((diff%86400000)/3600000)} ঘণ্টা`; }
                else { el.innerText = "সম্পন্ন/চলমান"; el.style.color = "#4caf50"; }
            });
        }, 1000);
    </script>
</body>
</html>
